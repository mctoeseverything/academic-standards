<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment</title>

  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<header class="exam-header-bar">
  <div class="exam-title">Algebra I Assessment</div>

  <div class="exam-meta">
    <span>Time Remaining: <strong id="time">01:30:00</strong></span>
    <button class="text-control">Pause</button>
  </div>
</header>

<main class="exam-shell">

  <!-- LEFT: Question navigation -->
  <aside class="sidebar" id="leftSidebar">
    <div class="sidebar-title">Questions</div>
    <div class="question-grid" id="questionGrid"></div>
  </aside>

  <!-- CENTER: Question -->
  <section class="main-panel">

    <div class="question-header">
      <span>Question <span id="questionNumberBadge">1</span></span>
      <button class="text-control" id="markToggle">Mark for Review</button>
    </div>

    <div class="question-body">
      <h1 id="questionText"></h1>
      <div id="choices"></div>
    </div>

    <div class="nav-bar">
      <button class="text-control" onclick="prevQuestion()">Previous</button>
      <button class="text-control" onclick="nextQuestion()">Next</button>
    </div>

  </section>

  <!-- RIGHT: Tools -->
  <aside class="sidebar">
    <div class="sidebar-title">Tools</div>
    <div class="tools-list">
      <button class="text-control">Calculator</button>
      <button class="text-control">Reference Sheet</button>
      <button class="text-control">Formula Sheet</button>
      <button class="text-control">Graphing Tool</button>
      <button class="text-control">Notes</button>
    </div>
  </aside>

</main>

<script src="./script.js"></script>
</body>
</html>
