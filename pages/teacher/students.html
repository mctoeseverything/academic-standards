<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Students | ASB</title>
  <link rel="stylesheet" href="/pages/shared.css">
</head>
<body data-page="teacher-students" data-role="teacher">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/teacher/dashboard"><div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="8" height="8" rx="1.5"></rect><rect x="12" y="12" width="8" height="8" rx="1.5"></rect><path d="M12 8h4v4"></path></svg></div><div><div class="brand-title">Academic Standards Board</div><div class="brand-subtitle">Teacher portal</div></div></a>
      <nav class="topnav"><a class="topnav-link" href="/teacher/courses">Courses</a><a class="topnav-link" href="/teacher/tests">Tests</a><button class="topnav-link" data-action="logout" type="button">Sign Out</button></nav>
    </div>
  </header>
  <main class="page-main">
    <div class="page-inner">
      <div class="message" id="teacherPageMessage" hidden></div>
      <div class="page-header"><div><div class="eyebrow">Student roster</div><h1 class="page-title">Students across your courses</h1><p class="page-copy">Search by name and expand a student to inspect their full attempt history.</p></div></div>
      <form id="studentSearchForm" class="button-row" style="margin-bottom:18px;">
        <input id="studentSearchInput" type="text" placeholder="Search by student name" style="min-width:280px;min-height:36px;padding:0 14px;border:1.5px solid #b8bcc6;border-radius:999px;">
        <button class="outline-button" type="submit">Search</button>
      </form>
      <div class="list" id="teacherStudentsList"></div>
    </div>
  </main>
  <script src="/pages/shared.js"></script>
</body>
</html>
