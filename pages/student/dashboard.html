<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard | ASB</title>
  <link rel="stylesheet" href="/pages/shared.css">
</head>
<body data-page="student-dashboard" data-role="student">
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/student/dashboard">
        <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="4" width="8" height="8" rx="1.5"></rect><rect x="12" y="12" width="8" height="8" rx="1.5"></rect><path d="M12 8h4v4"></path></svg></div>
        <div><div class="brand-title">Academic Standards Board</div><div class="brand-subtitle">Student portal</div></div>
      </a>
      <nav class="topnav">
        <a class="topnav-link" href="/student/courses">Courses</a>
        <a class="topnav-link" href="/student/history">History</a>
        <button class="topnav-link" data-action="logout" type="button">Sign Out</button>
      </nav>
    </div>
  </header>
  <main class="page-main">
    <div class="page-inner">
      <div class="message" id="studentPageMessage" hidden></div>
      <div class="page-header">
        <div>
          <div class="eyebrow">Student dashboard</div>
          <h1 class="page-title" id="studentGreeting">Welcome</h1>
          <p class="page-copy">Review assigned tests, recent results, and current course activity.</p>
        </div>
      </div>
      <section class="metric-grid" style="margin-bottom:24px;">
        <div class="metric"><h3>Tests taken</h3><p class="metric-value" id="testsTaken">0</p></div>
        <div class="metric"><h3>Average score</h3><p class="metric-value" id="averageScore">0%</p></div>
        <div class="metric"><h3>Courses active</h3><p class="metric-value" id="coursesActive">0</p></div>
      </section>
      <section class="two-column">
        <div class="panel">
          <h3>Assigned tests</h3>
          <div class="list" id="assignedTests"></div>
        </div>
        <div class="panel">
          <h3>Recent results</h3>
          <div class="list" id="recentResults"></div>
        </div>
      </section>
      <section class="panel" style="margin-top:24px;">
        <h3>Courses enrolled in</h3>
        <div class="card-grid" id="courseCards"></div>
      </section>
    </div>
  </main>
  <script src="/pages/shared.js"></script>
</body>
</html>
